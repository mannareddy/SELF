<!DOCTYPE html>
<html>
<head>
  <title>*SELF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      max-width: 640px;
      margin: auto;
      padding: 60px 20px;
      line-height: 2;
    }

    p {
      margin: 18px 0;
    }

    .center {
      text-align: center;
    }

    a {
      color: #fff;
      text-decoration: underline;
    }

    /* 🔥 Calm breathing effect */
    .pulse {
      display: inline-block;
      animation: pulse 3.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%   { opacity: 1; transform: scale(1); }
      50%  { opacity: 0.35; transform: scale(0.92); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

<div class="center">
  <p><span class="pulse">*</span>SELF</p>
  <p>“Who am I?”</p>
  <p>…</p>
  <p>Not something to be told.</p>
</div>

</body>
</html>
